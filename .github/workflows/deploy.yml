name: Deploy to Render

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
        
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: test_secret
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        uses: jakejarvis/render-deploy-action@master
        with:
          render-signup-url: https://dashboard.render.com
          render-service-type: web
          render-service-name: controlzapas-api
          render-repo: ${{ github.repository }}
          override-branch: main
          optional-deploy-branch: main
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
