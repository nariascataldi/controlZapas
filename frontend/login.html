<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | controlZapas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(-45deg, #111827, #1f2937, #b41340, #1f2937);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-icon {
            width: 72px; height: 72px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            margin: 0 auto 1.5rem;
            backdrop-filter: blur(5px);
        }

        .form-floating > label { color: rgba(255,255,255,0.6); }
        .form-floating > .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
        }
        .form-floating > .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
            color: white;
        }
        .form-floating > .form-control::placeholder { color: transparent; }

        .btn-gradient {
            background: linear-gradient(135deg, #e11d48, #9f1239);
            border: none;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            padding: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(225, 29, 72, 0.5);
            color: white;
        }
    </style>
</head>
<body>
    
    <div class="glass-container">
        <div class="text-center mb-4">
            <div class="logo-icon text-danger shadow-sm">
                <i class="bi bi-box-fill"></i>
            </div>
            <h2 class="fw-bold text-white mb-1 tracking-tight">controlZapas</h2>
            <p class="text-white-50 small mb-0">Gestión Laced Precision</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none py-2 small border-0 bg-danger bg-opacity-25 text-white" role="alert">
            <!-- Mensajes de error -->
        </div>

        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="inputUser" placeholder="Usuario" required autocomplete="username">
                <label for="inputUser"><i class="bi bi-person me-2"></i>Usuario</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="inputPassword" placeholder="Contraseña" required autocomplete="current-password">
                <label for="inputPassword"><i class="bi bi-lock me-2"></i>Contraseña</label>
            </div>

            <button class="btn btn-gradient w-100 mb-3" type="submit">
                Ingresar al Sistema <i class="bi bi-arrow-right-short ms-1 fs-5 align-middle"></i>
            </button>
            
            <p class="text-center text-white-50 mb-0" style="font-size: 0.75rem;">
                &copy; 2026 SysAdmin NestorBot Team
            </p>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
