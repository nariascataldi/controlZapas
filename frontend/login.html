<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | controlZapas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    
    <main id="main-content" class="login-page">
        <div class="glass-container" role="main" aria-label="Formulario de inicio de sesión">
        <div class="text-center mb-4">
            <div class="logo-icon mb-3" aria-hidden="true">
                <i class="bi bi-box-fill"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1 tracking-tight">controlZapas</h2>
            <p class="text-muted small mb-0">Gestión Laced Precision</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none py-2 small border-0" role="alert">
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="inputUser" placeholder="Usuario" required autocomplete="username">
                <label for="inputUser"><i class="bi bi-person me-2" aria-hidden="true"></i>Usuario</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="inputPassword" placeholder="Contraseña" required autocomplete="current-password">
                <label for="inputPassword"><i class="bi bi-lock me-2" aria-hidden="true"></i>Contraseña</label>
            </div>

            <button class="btn btn-gradient w-100 py-3" type="submit">
                Ingresar al Sistema <i class="bi bi-arrow-right-short ms-1 fs-5 align-middle" aria-hidden="true"></i>
            </button>
            
            <p class="text-center text-muted mb-0" style="font-size: 0.75rem;">
                &copy; 2026 SysAdmin NestorBot Team
            </p>
        </form>
    </div>
    </main>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
