<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | controlZapas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center py-4">
    
    <main class="form-signin w-100 m-auto" style="max-width: 360px;">
        <div class="card shadow-sm border-0 premium-shadow rounded-4">
            <div class="card-body p-4 p-md-5">
                <form id="loginForm">
                    <div class="text-center mb-4">
                        <div class="brand-icon mb-3">👟</div>
                        <h1 class="h3 mb-3 fw-bold color-primary">controlZapas</h1>
                        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
                    </div>

                    <div id="loginAlert" class="alert alert-danger d-none py-2 small" role="alert">
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="inputUser" placeholder="Usuario" required>
                        <label for="inputUser">Usuario</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control rounded-3" id="inputPassword" placeholder="Contraseña" required>
                        <label for="inputPassword">Contraseña</label>
                    </div>

                    <button class="btn btn-primary w-100 py-2 rounded-3 fw-medium btn-premium" type="submit">Ingresar</button>
                    <p class="mt-4 mb-0 text-muted text-center small">&copy; 2026 Nestorbot Solutions</p>
                </form>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
