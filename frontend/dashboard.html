<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | controlZapas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Header / Floating Navbar (Glass & Gradient Rule) -->
    <div class="container mt-3 mb-4">
        <nav class="navbar navbar-expand-lg rounded-4 glass-nav px-3 py-2">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold color-primary" href="dashboard.html">
                    👟 controlZapas <span class="badge bg-secondary ms-2 small">Admin</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link color-dark fw-medium" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link color-dark fw-medium" href="stock.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link color-dark fw-medium" href="ventas.html">Punto de Venta</a></li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-outline-secondary btn-sm mt-1 border-0" onclick="logout()">Cerrar Sesión</button>
                    </li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="container py-2">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 color-dark fw-bold">Resumen de Negocio</h2>
            <div class="text-muted small" id="currentDate"></div>
        </div>

        <!-- Widgets -->
        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <div class="card h-100 widget-card bg-gradient-primary text-white p-2">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2 text-white-50">Ventas Totales</h6>
                                <h2 class="card-title mb-0 fw-bold" id="widgetTotalVentas">$0</h2>
                            </div>
                            <div class="widget-icon bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="bi bi-currency-dollar fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-4">
                <div class="card h-100 widget-card p-2">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">Unidades Vendidas</h6>
                                <h2 class="card-title mb-0 fw-bold color-dark" id="widgetUnidades">0</h2>
                            </div>
                            <div class="widget-icon bg-success bg-opacity-10 text-success rounded-circle p-3">
                                <i class="bi bi-box-seam fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card h-100 widget-card p-2">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">Avisos Stock Crítico</h6>
                                <h2 class="card-title mb-0 fw-bold text-danger" id="widgetStockCritico">0</h2>
                            </div>
                            <div class="widget-icon bg-danger bg-opacity-10 text-danger rounded-circle p-3">
                                <i class="bi bi-exclamation-triangle fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tablas de Historial -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-transparent pt-4 pb-0 px-4 mt-2">
                        <h5 class="fw-bold color-dark">Últimas Ventas</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table custom-table align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Fecha</th>
                                        <th>Cliente</th>
                                        <th>Vendedor</th>
                                        <th class="text-end">Total</th>
                                        <th class="text-end">Comisión</th>
                                    </tr>
                                </thead>
                                <tbody id="historialVentasBo">
                                    <!-- Carga por JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            verificarAcceso('ADMIN');
            cargarDashboard();
            cargarHistorialAdmin();
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES', options);
        });
    </script>
</body>
</html>
