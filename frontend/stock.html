<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | controlZapas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light pb-5">

    <!-- Header / Floating Navbar (Glass & Gradient Rule) -->
    <div class="container mt-3 mb-4">
        <nav class="navbar navbar-expand-lg rounded-4 glass-nav px-3 py-2">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold color-primary" href="dashboard.html" id="navBrand">
                    👟 controlZapas
                </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                    <!-- Links llenados por JS dependiendo del rol -->
                </ul>
            </div>
        </nav>
    </div>

    <div class="container py-2">
        
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="h3 mb-0 color-dark fw-bold">Inventario de Productos</h2>
            <div class="d-flex gap-2">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="busquedaStock" class="form-control border-start-0 ps-0" placeholder="Buscar talla, modelo..." oninput="filtrarStock()">
                </div>
                <button class="btn btn-primary d-none btn-premium" id="btnAdminNuevoProd" data-bs-toggle="modal" data-bs-target="#modalNuevoProd">
                    <i class="bi bi-plus-lg"></i> Nuevo
                </button>
            </div>
        </div>

        <div class="card card-hover-kinetic">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table custom-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-2">Modelo</th>
                                <th>Detalle (Color/Talla)</th>
                                <th>SKU</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th class="text-end pe-2">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaStockBody">
                            <!-- JS inyecta filas aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Producto (Admin) -->
    <div class="modal fade" id="modalNuevoProd" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 rounded-4 premium-shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pb-4">
                    <form id="formNuevoProducto">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">Nombre del Modelo</label>
                                <input type="text" class="form-control" id="prodNombre" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">Marca</label>
                                <input type="text" class="form-control" id="prodMarca" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">Precio Mayorista ($)</label>
                                <input type="number" class="form-control" id="prodMayorista" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small mb-1">Precio Minorista ($)</label>
                                <input type="number" class="form-control" id="prodMinorista" required>
                            </div>
                        </div>

                        <h6 class="fw-bold mb-3 border-bottom pb-2">Agregar Variante</h6>
                        <div class="row g-2 mb-3 align-items-end">
                            <div class="col-md-2">
                                <label class="form-label text-muted small mb-1">SKU</label>
                                <input type="text" class="form-control" id="varSku">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small mb-1">Color</label>
                                <input type="text" class="form-control" id="varColor">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small mb-1">Talla</label>
                                <input type="text" class="form-control" id="varTalla">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small mb-1">Stock</label>
                                <input type="number" class="form-control" id="varStock">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small mb-1">Alerta Min.</label>
                                <input type="number" class="form-control" id="varMin">
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-primary w-100 fw-medium btn-premium" onclick="agregarVarianteTemporal()">Agregar</button>
                            </div>
                        </div>

                        <div class="table-responsive mb-4">
                            <table class="table table-sm pb-0 mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>SKU</th> <th>Color</th> <th>Talla</th> <th>Stock</th> <th>Min</th> <th>Quitar</th>
                                    </tr>
                                </thead>
                                <tbody id="listaVariantesTemp"></tbody>
                            </table>
                        </div>

                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-3" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary rounded-3 btn-premium ms-2">Guardar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            verificarAcceso();
            configurarNavBar();
            cargarInventario();
        });
    </script>
</body>
</html>
